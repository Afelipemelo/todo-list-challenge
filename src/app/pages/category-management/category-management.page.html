<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Gestionar Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item lines="none" class="ion-margin-bottom">
    <ion-input [(ngModel)]="newCategoryName" placeholder="Nombre de la categoría" label="Nueva:" labelPlacement="floating"></ion-input>
    <ion-button slot="end" (click)="addCategory()" [disabled]="!newCategoryName.trim()">
      <ion-icon name="add"></ion-icon>
    </ion-button>
  </ion-item>

  <ion-list>
    <ion-list-header>
      <ion-label>Categorías existentes</ion-label>
    </ion-list-header>

    @for (cat of categories; track cat.id) {
      <ion-item-sliding>
        <ion-item>
          <ion-icon name="bookmark" slot="start" color="primary"></ion-icon>
          <ion-label>{{ cat.name }}</ion-label>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="removeCategory(cat.id)">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    } @empty {
      <p class="ion-text-center">No hay categorías creadas.</p>
    }
  </ion-list>
</ion-content>
