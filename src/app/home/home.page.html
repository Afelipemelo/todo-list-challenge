<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Mis Tareas</ion-title>
  </ion-toolbar>

  <div class="filter-container">
    <ion-item lines="none">
      <ion-label>Filtrar por:</ion-label>
      <ion-select [(ngModel)]="selectedCategory" (ionChange)="applyFilter()" interface="popover" toggleIcon="chevron-down-outline" [interfaceOptions]="{ cssClass: 'glass-popover' }">
        <ion-select-option value="all">Todas</ion-select-option>
        @for (cat of categories; track cat.id) {
          <ion-select-option [value]="cat.id">{{ cat.name }}</ion-select-option>
        }
      </ion-select>
    </ion-item>
  </div>
</ion-header>

<ion-content [scrollY]="false">
  <cdk-virtual-scroll-viewport itemSize="92" minBufferPx="1000" maxBufferPx="2000" class="task-viewport">

    <ion-list style="padding-top : 8px">
      <ion-item-sliding *cdkVirtualFor="let task of filteredTasks; trackBy: trackById">
        <ion-item lines="none">
          <ion-checkbox slot="start" [(ngModel)]="task.completed" (ionChange)="saveTasks()"></ion-checkbox>
          <ion-label>
            <h2 [style.text-decoration]="task.completed ? 'line-through' : 'none'"
                [style.opacity]="task.completed ? '0.4' : '1'">
              {{ task.title }}
            </h2>
            @if (task.categoryId) {
              <ion-badge lines="none">{{ getCategoryName(task.categoryId) }}</ion-badge>
            }
          </ion-label>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="deleteTask(task.id)" style="border-radius: 0 14px 14px 0;">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>

    @if (filteredTasks.length === 0) {
      <div class="ion-padding ion-text-center" style="margin-top: 80px;">
        <ion-icon name="sparkles-outline" style="font-size: 3.5rem; color: var(--glass-border)"></ion-icon>
        <p style="color: var(--text-secondary); margin-top: 15px;">Todo listo. No hay tareas pendientes.</p>
      </div>
    }

  </cdk-virtual-scroll-viewport>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/category-management" color="secondary">
      <ion-icon name="settings"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  @if (showMassiveBtn) {
    <ion-fab vertical="bottom" horizontal="start" slot="fixed">
      <ion-fab-button (click)="generateMassiveTasks()" color="warning">
        <ion-icon name="flask"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  } @else {
    <ion-fab vertical="bottom" horizontal="start" slot="fixed">
      <ion-fab-button (click)="openAddTask()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  }

</ion-content>
